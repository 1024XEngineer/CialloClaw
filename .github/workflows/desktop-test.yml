name: Desktop Test

on:
  push:
    paths:
      - ".github/workflows/desktop-test.yml"
      - "apps/desktop/**"
      - "packages/config/**"
      - "packages/protocol/**"
      - "packages/ui/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - ".github/workflows/desktop-test.yml"
      - "apps/desktop/**"
      - "packages/config/**"
      - "packages/protocol/**"
      - "packages/ui/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  desktop-windows-build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache-dependency-path: go.sum

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run stable desktop checks
        run: |
          pnpm --dir apps/desktop lint
          pnpm --dir apps/desktop typecheck
          pnpm --dir apps/desktop test:dashboard
          pnpm --dir apps/desktop test:memory

      - name: Build local-service sidecar for desktop tests
        shell: pwsh
        run: |
          $targetTriple = ((rustc -vV) | Select-String '^host: ' | ForEach-Object {
            $_.Line.Substring(6).Trim()
          })
          if ([string]::IsNullOrWhiteSpace($targetTriple)) {
            throw "Failed to determine the Rust target triple for the local-service sidecar."
          }

          $sidecarDirectory = "apps/desktop/src-tauri/binaries"
          New-Item -ItemType Directory -Force -Path $sidecarDirectory | Out-Null

          $sidecarPath = Join-Path $sidecarDirectory "local-service-$targetTriple.exe"
          go build -trimpath -o $sidecarPath ./services/local-service/cmd/server

          if (-not (Test-Path -LiteralPath $sidecarPath)) {
            throw "The local-service sidecar was not built at $sidecarPath."
          }

      - name: Build Windows Tauri app
        working-directory: apps/desktop
        run: pnpm exec tauri build --debug --no-bundle
