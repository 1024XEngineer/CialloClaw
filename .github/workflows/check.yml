name: Test

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'

      - name: Download Go modules
        run: go mod download

      - name: Resolve local-service style base
        id: style-base
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          DEFAULT_BASE_REF: origin/${{ github.event.repository.default_branch }}
        run: |
          BASE_SHA="$PR_BASE_SHA"
          if [ -z "$BASE_SHA" ] || ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            BASE_SHA="$DEFAULT_BASE_REF"
          fi
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Check local-service Go style
        run: go run ./scripts/ci/local-service-style -base "${{ steps.style-base.outputs.base_sha }}"

      - name: Vet local-service Go code
        run: go vet ./services/local-service/...

      - name: Staticcheck local-service Go code
        run: go run honnef.co/go/tools/cmd/staticcheck ./services/local-service/...

      - name: Test Go code with coverage
        run: go test -v -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload code coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          disable_search: true
          files: coverage.out
