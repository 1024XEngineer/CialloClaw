          - paragraph [ref=e37]: 从下载、启动到模型配置，这一页覆盖第一次真正把 CialloClaw 跑起来所需的最短路径。
        - article [ref=e38]:
          - generic [ref=e39]:
            - heading "下载与版本" [level=2] [ref=e40]
            - paragraph [ref=e41]: 桌面端安装包、版本号和更新记录统一以 GitHub Releases 为准，不再单独维护一份官网静态版本表。
            - paragraph [ref=e42]: 如果 Releases 页面里已经有最新版本，请优先下载最新 stable release；如果还没有公开 release，则说明当前仓库还未发布可下载桌面包。
            - generic [ref=e43]:
              - link "查看 Releases" [ref=e44] [cursor=pointer]:
                - /url: https://github.com/Late-Smoke/CialloClaw/releases
              - link "查看最新版本" [ref=e45] [cursor=pointer]:
                - /url: https://github.com/Late-Smoke/CialloClaw/releases/latest
          - generic [ref=e46]:
            - heading "启动方式" [level=2] [ref=e47]
            - paragraph [ref=e48]: 只看官网介绍时，运行 pnpm dev:website 即可。
            - paragraph [ref=e49]: 验证桌面端交互时，建议分别启动 pnpm dev:service 和 pnpm dev:desktop，让本地服务与桌面宿主同时在线。
            - paragraph [ref=e50]: 第一次拉取仓库后，先执行 corepack enable 和 pnpm install，确保前端依赖完整。
          - generic [ref=e51]:
            - heading "模型配置" [level=2] [ref=e52]
            - paragraph [ref=e53]: 模型配置放在桌面端控制面板里处理：先准备 API Key，再在模型或 Provider 相关设置项中填入。
            - paragraph [ref=e54]: 如果你只是先验证界面，不一定要立刻填 Key；但凡要实际跑补全、理解、工具调用或任务执行，Key 和 Provider 参数都需要配置完成。
            - paragraph [ref=e55]: 当你更换 Provider、模型名称或 endpoint 后，建议立刻做一次最小测试请求，确认配置可用后再正式使用。
