              - paragraph: CialloClaw 是一款常驻桌面的 Agent 助手。
              - paragraph: 它会以悬浮球的形式停留在桌面边缘，在你阅读网页、处理文件、查看报错或整理任务时，帮你理解内容、生成草稿、分析文件和推进下一步。
