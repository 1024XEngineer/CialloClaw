          - paragraph [ref=e73]: 把 CialloClaw 看成一个桌面现场协作 Agent，而不是另一个聊天窗口。
        - article [ref=e74]:
          - generic [ref=e75]:
            - heading "太长不看" [level=2] [ref=e76]
            - paragraph [ref=e77]: 你可以把 CialloClaw 理解为一个更贴近桌面现场的协作入口：语音、文本选中、文件拖拽都能直接进入任务。
            - paragraph [ref=e78]: 它对外围绕 task 组织，对内通过 run、step、event、tool_call 编排，并把结果统一交付到 delivery_result 和 artifact。
          - generic [ref=e79]:
            - heading "为什么这样做" [level=2] [ref=e80]
            - paragraph [ref=e81]: 我们不想让用户为了一个协作动作，总是先切进大聊天页、再补上下文、再担心副作用。
            - paragraph [ref=e82]: 所以官网和产品叙事都围绕同一条主链路：近场输入承接、任务创建、治理执行、正式交付。
