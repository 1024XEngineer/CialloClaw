          - heading "快速上手" [level=1] [ref=e52]
          - paragraph [ref=e53]: 从它是什么、怎么下载、如何启动，到第一次配置模型和尝试使用，这一页覆盖第一次真正把 CialloClaw 跑起来的完整路径。
        - article [ref=e54]:
          - generic [ref=e55]:
            - heading "CialloClaw 是什么？" [level=2] [ref=e56]
            - paragraph [ref=e57]: CialloClaw 是一款常驻桌面的 Agent 助手。
            - paragraph [ref=e58]: 它会以悬浮球的形式停留在桌面边缘，在你阅读网页、处理文件、查看报错或整理任务时，帮你理解内容、生成草稿、分析文件和推进下一步。
            - paragraph [ref=e59]: 你可以把它理解成：一只在桌面上随时待命的小助手。需要时叫它，不需要时它安静待着。
            - paragraph [ref=e60]: CialloClaw 的特点包括：桌面常驻、轻量协作、上下文感知、低打扰、可确认，以及开源免费。
          - generic [ref=e61]:
            - heading "下载与启动" [level=2] [ref=e62]
            - paragraph [ref=e63]: 你可以选择两个版本：最新版适合普通用户，推荐安装后直接使用；先行版适合开发者和早期体验用户，可以从源码启动并体验最新功能。
            - paragraph [ref=e64]: 最新版与版本号统一以 GitHub Releases 为准；当前 latest release 会跳转到 V0.3.0。
            - paragraph [ref=e65]: 先行版则直接使用源码仓库，你可以通过 Git 克隆或下载 ZIP 获取最新开发内容。
            - generic [ref=e66]:
              - link "下载最新版" [ref=e67] [cursor=pointer]:
                - /url: https://github.com/1024XEngineer/CialloClaw/releases/latest
              - link "下载先行版" [ref=e68] [cursor=pointer]:
                - /url: https://github.com/1024XEngineer/CialloClaw
          - generic [ref=e69]:
            - heading "最新版安装" [level=2] [ref=e70]
            - paragraph [ref=e71]: 点击“下载最新版”后，根据安装指引一步步完成即可。
            - paragraph [ref=e72]: 安装完成后，启动 CialloClaw。
            - paragraph [ref=e73]: 如果启动成功，你会在桌面上看到悬浮球。
          - generic [ref=e74]:
            - heading "先行版安装" [level=2] [ref=e75]
            - paragraph [ref=e76]: 先行版适合想体验最新功能，或者希望从源码运行 CialloClaw 的用户。
            - paragraph [ref=e77]: 在开始前，请先准备好 Node.js、pnpm、Git、Rust 和 Tauri 开发环境。
            - paragraph [ref=e78]: 你可以使用 Git 克隆仓库：git clone https://github.com/1024XEngineer/CialloClaw.git，然后进入 CialloClaw 文件夹；也可以从 GitHub 页面通过 Code → Download ZIP 下载并解压。
            - paragraph [ref=e79]: 进入项目根目录后，先执行 pnpm install 安装依赖。
            - paragraph [ref=e80]: 然后在第一个终端执行 pnpm dev:service，并保持这个终端持续运行。
            - paragraph [ref=e81]: 接着打开第二个终端，执行 pnpm --dir apps/desktop exec tauri dev，等待桌面端启动。
            - paragraph [ref=e82]: 先行版启动流程总结：1. 获取源码；2. 进入 CialloClaw 根目录；3. 执行 pnpm install；4. 第一个终端执行 pnpm dev:service；5. 保持第一个终端运行；6. 第二个终端执行 pnpm --dir apps/desktop exec tauri dev；7. 等待桌面端启动。
            - paragraph [ref=e83]: 第一次启动时，CialloClaw 会自动进入新手指引。跟随指引操作，即可初步了解悬浮球、语音、工作台和控制面板。
            - link "源码仓库" [ref=e85] [cursor=pointer]:
              - /url: https://github.com/1024XEngineer/CialloClaw
          - generic [ref=e86]:
            - heading "配置模型" [level=2] [ref=e87]
            - paragraph [ref=e88]: CialloClaw 需要先配置模型，才能正常回复。
            - paragraph [ref=e89]: 在系统托盘中找到 CialloClaw 图标，右键点击图标，选择“控制面板”。进入控制面板后，点击左侧“模型与安全”。
            - paragraph [ref=e90]: 在右侧填写模型配置。Provider 可以自命名，其余字段需要填写正确的模型服务信息。
            - paragraph [ref=e91]: 填写完成后，先点击“测试连接”，测试成功后，再点击“保存设置”。到这里，模型配置就完成了。
          - generic [ref=e92]:
            - heading "尝试使用" [level=2] [ref=e93]
            - paragraph [ref=e94]: 完成配置后，可以先试三个最简单的动作。
            - paragraph [ref=e95]: 第一，点击悬浮球下方的输入框，输入“你好，介绍一下你能做什么”，发送后，CialloClaw 会在气泡中回复。
            - paragraph [ref=e96]: 第二，长按悬浮球，说出你的需求，例如“帮我总结当前页面”。长按表示开始说话，长按后上滑表示锁定通话，长按后下滑表示取消本次输入。
            - paragraph [ref=e97]: 第三，双击悬浮球，可以打开工作台。工作台用于查看任务、结果、记录和更多设置。
          - generic [ref=e98]:
            - heading "常用动作速览" [level=2] [ref=e99]
            - paragraph [ref=e100]: 你可以通过这些方式和 CialloClaw 互动：悬停用于输入一句话；长按用于语音协作；长按后上滑 / 下滑用于锁定通话 / 取消输入；双击用于打开工作台；选中文本后点击可处理选中内容；拖入文件可分析或总结文件。
            - paragraph [ref=e101]: 刚开始只要记住：长按说话、悬停输入、双击打开工作台。
          - generic [ref=e102]:
            - heading "初认工作台" [level=2] [ref=e103]
            - paragraph [ref=e104]: 工作台的打开方式是双击悬浮球。
            - paragraph [ref=e105]: 工作台是 CialloClaw 的主界面。你可以在这里查看当前任务、历史任务、生成结果、安全记录、模型设置，以及记忆与任务巡检相关内容。
            - paragraph [ref=e106]: 日常使用时，你不需要一直打开工作台。大多数轻量操作都可以直接通过悬浮球完成。
            - paragraph [ref=e107]: 工作台更适合在这些时候打开：查看任务进度、查看生成结果、检查 CialloClaw 做过什么、修改设置、处理异常或失败任务。
