      - main [ref=e49]:
        - generic [ref=e50]:
          - paragraph [ref=e51]: Docs
          - heading "常见问题" [level=1] [ref=e52]
          - paragraph [ref=e53]: 这里集中回答第一次使用时最常见的问题，包括模型 Key 获取、连接失败和先行版启动异常。
        - article [ref=e54]:
          - generic [ref=e55]:
            - heading "工作台白屏了怎么办？" [level=2] [ref=e56]
            - paragraph [ref=e57]: 在工作台窗口内右键，选择刷新。
            - paragraph [ref=e58]: 如果仍然无法恢复，可以退出 CialloClaw 后重新启动。
          - generic [ref=e59]:
            - heading "悬浮球不见了怎么办？" [level=2] [ref=e60]
            - paragraph [ref=e61]: 可能是悬浮球贴到了屏幕边缘。
            - paragraph [ref=e62]: 你可以先在屏幕四周找一找。也可以在系统托盘中右键 CialloClaw 图标，点击“显示悬浮球”。
          - generic [ref=e63]:
            - heading "输入后没有回复怎么办？" [level=2] [ref=e64]
            - paragraph [ref=e65]: 请先检查模型是否已配置、测试连接是否成功、网络是否正常。
            - paragraph [ref=e66]: 如果你使用的是先行版，还需要确认第一个终端中的服务仍在运行：pnpm dev:service。
          - generic [ref=e67]:
            - heading "语音不能用怎么办？" [level=2] [ref=e68]
            - paragraph [ref=e69]: 请检查系统是否允许 CialloClaw 使用麦克风、当前设备是否有可用麦克风，以及模型配置是否正常。
          - generic [ref=e70]:
            - heading "先行版启动失败怎么办？" [level=2] [ref=e71]
            - paragraph [ref=e72]: 可以按顺序检查：是否已安装 pnpm；是否已安装 Rust / Tauri 开发环境；是否在项目根目录执行命令；pnpm install 是否成功；第一个终端是否保持运行；第二个终端命令是否输入完整。
          - generic [ref=e73]:
            - heading "最新版和先行版有什么区别？" [level=2] [ref=e74]
            - paragraph [ref=e75]: 最新版更稳定，适合普通用户。
            - paragraph [ref=e76]: 先行版更新更快，适合开发者和早期体验用户，可能会遇到未完成或不稳定的功能。
          - generic [ref=e77]:
            - heading "怎么获取 API Key，然后怎么使用？" [level=2] [ref=e78]
            - paragraph [ref=e79]: 先确定你要使用的模型服务商，例如 OpenAI、Anthropic、OpenRouter 或其他兼容 OpenAI API 的 Provider。
            - paragraph [ref=e80]: 登录对应服务商的官网控制台，进入 API Keys、Developers 或 Credentials 页面，创建新的 secret key。
            - paragraph [ref=e81]: 创建后立刻复制并妥善保存；大多数平台只会在首次创建时完整展示一次。
            - paragraph [ref=e82]: 如果平台要求先绑定账单、手机号或组织，请先完成这些前置条件，否则即使拿到 Key 也可能无法成功请求。
            - paragraph [ref=e83]: 拿到 Key 后，打开系统托盘中的 CialloClaw 控制面板，进入“模型与安全”，把 API Key 粘贴到对应字段，再填写 base URL、模型名称或服务商要求的其他参数。
            - paragraph [ref=e84]: 填写完成后，先点击“测试连接”，确认成功后再点击“保存设置”。如果失败，优先检查 Key 是否复制完整、模型名是否正确、endpoint 是否匹配，以及账户额度是否可用。
            - generic [ref=e85]:
              - link "OpenAI API Keys" [ref=e86] [cursor=pointer]:
                - /url: https://platform.openai.com/api-keys
              - link "Anthropic API Keys" [ref=e87] [cursor=pointer]:
                - /url: https://console.anthropic.com/settings/keys
              - link "OpenRouter API Keys" [ref=e88] [cursor=pointer]:
                - /url: https://openrouter.ai/keys
          - generic [ref=e89]:
            - heading "CialloClaw 是免费的吗？" [level=2] [ref=e90]
            - paragraph [ref=e91]: CialloClaw 本身开源免费。
            - paragraph [ref=e92]: 如果你使用第三方模型服务，可能会产生模型调用费用。具体费用取决于你配置的模型和服务提供方。
