          - paragraph [ref=e73]: 先行版适合想体验最新功能，或者希望从源码运行 CialloClaw 的用户。
          - paragraph [ref=e74]: 在开始前，请先准备好：
          - code [ref=e76]: Node.js pnpm Git Rust / Tauri 开发环境
          - heading "第一步：获取源码" [level=3] [ref=e77]
          - paragraph [ref=e78]: 你可以用两种方式获取先行版源码。
          - heading "方式一：使用 Git 克隆仓库" [level=4] [ref=e79]
          - paragraph [ref=e80]: 打开终端，执行：
          - code [ref=e82]: git clone https://github.com/1024XEngineer/CialloClaw.git
          - paragraph [ref=e83]: 然后进入项目文件夹：
          - code [ref=e85]: cd CialloClaw
          - heading "方式二：下载 ZIP" [level=4] [ref=e86]
          - paragraph [ref=e87]: 进入 GitHub 仓库页面，点击：
          - code [ref=e89]: Code → Download ZIP
          - paragraph [ref=e90]: 下载完成后，解压 ZIP 文件。
          - paragraph [ref=e91]:
            - text: 然后进入解压后的
            - code [ref=e92]: CialloClaw
            - text: 文件夹。
          - separator [ref=e93]
          - heading "第二步：安装依赖" [level=3] [ref=e94]
          - paragraph [ref=e95]:
            - text: 在
            - code [ref=e96]: CialloClaw
            - text: 文件夹根目录右键，打开第一个终端。
          - paragraph [ref=e97]: 执行：
          - code [ref=e99]: pnpm install
          - paragraph [ref=e100]: 等待依赖安装完成。
          - separator [ref=e101]
          - heading "第三步：启动本地服务" [level=3] [ref=e102]
          - paragraph [ref=e103]: 在第一个终端里继续执行：
          - code [ref=e105]: pnpm dev:service
          - paragraph [ref=e106]:
            - text: 执行后不要关闭这个终端。
            - text: 它需要保持运行。
          - separator [ref=e107]
          - heading "第四步：启动桌面端" [level=3] [ref=e108]
          - paragraph [ref=e109]:
            - text: 回到
            - code [ref=e110]: CialloClaw
            - text: 文件夹根目录。
          - paragraph [ref=e111]: 再次右键，打开第二个终端。
          - paragraph [ref=e112]: 执行：
          - code [ref=e114]: pnpm --dir apps/desktop exec tauri dev
          - paragraph [ref=e115]: 等待片刻后，CialloClaw 会自动启动。
          - paragraph [ref=e116]: 如果启动成功，你会在桌面上看到悬浮球。
