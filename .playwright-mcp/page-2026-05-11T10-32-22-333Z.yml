          - code [ref=e120]: 1. 获取源码 2. 进入 CialloClaw 根目录 3. 执行 pnpm install 4. 第一个终端执行 pnpm dev:service 5. 保持第一个终端运行 6. 第二个终端执行 pnpm --dir apps/desktop exec tauri dev 7. 等待桌面端启动
          - paragraph [ref=e121]: 第一次启动时，CialloClaw 会自动进入新手指引。
