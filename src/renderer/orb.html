<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Orb</title>
    <link rel="stylesheet" href="./orb.css" />
  </head>
  <body>
    <div id="app" class="orb-window">
      <div id="dockHint" class="dock-hint"></div>
      <div id="microTip" class="micro-tip"></div>
      <div id="taskTooltip" class="task-tooltip hidden">
        <div class="tooltip-title" id="tooltipTitle"></div>
        <div class="tooltip-desc" id="tooltipDesc"></div>
        <div class="tooltip-meta">
          <span id="tooltipAvailability"></span>
          <span id="tooltipHint"></span>
        </div>
      </div>
      <div id="taskLibrary" class="task-library hidden">
        <div class="library-header">
          <div>
            <strong>更多任务</strong>
            <span>紧凑任务库</span>
          </div>
          <button id="libraryClose" class="ghost-button" type="button">关闭</button>
        </div>
        <div id="libraryList" class="library-list"></div>
      </div>
      <div id="ringLayer" class="ring-layer"></div>
      <button id="orbShell" class="orb-shell" type="button" aria-label="展开任务环">
        <div class="orb-progress"></div>
        <div class="orb-surface"></div>
        <canvas id="spriteCanvas" width="72" height="72"></canvas>
        <div id="statusDot" class="status-dot"></div>
      </button>
    </div>
    <script src="./orb.js"></script>
  </body>
</html>
