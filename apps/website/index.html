<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CialloClaw</title>
    <meta
      name="description"
      content="CialloClaw 是一个可爱、优雅、低打扰的桌面协作 Agent，让语音、文本选中和文件拖拽都能自然进入任务协作。"
    />
    <link href="https://fonts.font.im/css?family=Fredoka+One" rel="stylesheet" />
    <link href="https://fonts.font.im/css?family=Montserrat" rel="stylesheet" />
    <script>
      // Restore the user's theme choice before React mounts so there is never a
      // flash of the wrong colour scheme across page navigations.
      (function () {
        var theme = localStorage.getItem("cialloclaw-website-theme");
        if (theme === "dark") {
          document.documentElement.dataset.theme = "dark";
        } else {
          document.documentElement.dataset.theme = "light";
        }
        var locale = localStorage.getItem("cialloclaw-website-locale");
        if (locale === "en" || locale === "zh") {
          document.documentElement.lang = locale === "en" ? "en" : "zh-CN";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
