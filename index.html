<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Dashboard Mock</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --panel: #ffffff;
      --panel-2: #fafafa;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --line-2: #d1d5db;
      --accent: #111827;
      --accent-2: #4b5563;
      --ok: #0f766e;
      --warn: #b45309;
      --bad: #b91c1c;
      --soft: #eef2ff;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, #f5f6f8 44%, #eef0f3 100%);
      color: var(--text);
      overflow: hidden;
    }

    button, input {
      font: inherit;
    }

    button {
      border: 0;
      background: none;
      color: inherit;
      cursor: pointer;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: 18px;
    }

    .shell {
      width: 100%;
      height: 100%;
      border: 1px solid rgba(17, 24, 39, 0.08);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.66);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.82);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 250px;
    }

    .brand-badge {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      background: linear-gradient(180deg, #ffffff, #f3f4f6);
    }

    .brand h1 {
      margin: 0;
      font-size: 15px;
      line-height: 1.1;
      letter-spacing: 0.02em;
    }

    .brand p {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
    }

    .nav button,
    .seg button,
    .pill,
    .chip,
    .ghost,
    .action {
      transition: 140ms ease;
    }

    .nav button {
      min-width: 70px;
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
    }

    .nav button.active {
      background: var(--accent);
      color: #fff;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .ghost {
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--accent);
    }

    .ghost:hover,
    .nav button:hover,
    .seg button:hover,
    .action:hover,
    .pill:hover {
      transform: translateY(-1px);
    }

    .stage {
      position: relative;
      overflow: hidden;
      padding: 16px;
    }

    .stage-inner {
      height: 100%;
      overflow: auto;
      padding-right: 6px;
    }

    .page {
      min-height: 100%;
      display: grid;
      gap: 14px;
      animation: fadeIn 180ms ease;
    }

    .page-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 4px 0;
    }

    .page-head h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .page-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      max-width: 72ch;
    }

    .page-note {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      max-width: 42ch;
    }

    .banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid rgba(180, 83, 9, 0.18);
      background: #fff8ee;
      border-radius: 16px;
      color: #7c2d12;
      font-size: 13px;
    }

    .banner .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .layout-2,
    .layout-3 {
      display: grid;
      gap: 14px;
    }

    .layout-2 {
      grid-template-columns: 1.2fr 0.8fr;
    }

    .layout-3 {
      grid-template-columns: 1.1fr 1fr 0.9fr;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.86);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #fbfbfb);
    }

    .panel-head strong {
      font-size: 14px;
    }

    .panel-head .sub {
      font-size: 12px;
      color: var(--muted);
    }

    .stack {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 14px;
      cursor: pointer;
      text-align: left;
    }

    .card:hover {
      border-color: var(--line-2);
      box-shadow: 0 12px 28px rgba(17,24,39,0.05);
      transform: translateY(-1px);
    }

    .card-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .card h3 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .chip.dark {
      color: #111827;
      background: #f3f4f6;
    }

    .chip.ok { color: var(--ok); background: #f0fdfa; border-color: rgba(15,118,110,0.16); }
    .chip.warn { color: var(--warn); background: #fff7ed; border-color: rgba(180,83,9,0.16); }
    .chip.bad { color: var(--bad); background: #fef2f2; border-color: rgba(185,28,28,0.16); }
    .chip.soft { color: #3730a3; background: var(--soft); border-color: rgba(99,102,241,0.16); }

    .mini {
      font-size: 11px;
      color: var(--muted);
    }

    .seg {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      overflow: hidden;
    }

    .seg button {
      padding: 8px 12px;
      font-size: 12px;
      color: var(--muted);
      border-right: 1px solid var(--line);
    }

    .seg button:last-child { border-right: 0; }
    .seg button.active {
      background: var(--accent);
      color: #fff;
    }

    .list-note {
      padding: 0 14px 14px;
      color: var(--muted);
      font-size: 12px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      padding: 14px;
      min-height: 108px;
    }

    .stat .k {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .stat .v {
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .stat .d {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .risk-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .risk {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 14px;
    }

    .risk h4 {
      margin: 0 0 6px;
      font-size: 14px;
    }

    .risk p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .jump-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .jump {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 14px;
      text-align: left;
    }

    .jump strong { display: block; margin-bottom: 6px; }

    .timeline {
      display: grid;
      gap: 10px;
    }

    .timeline-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 14px;
      text-align: left;
    }

    .timeline-item .top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .timeline-item h4 {
      margin: 0;
      font-size: 14px;
    }

    .timeline-item p {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .detail-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    .detail-overlay.show { display: flex; }

    .detail-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15,23,42,0.28);
      backdrop-filter: blur(4px);
    }

    .detail {
      position: relative;
      width: min(960px, calc(100vw - 36px));
      max-height: min(88vh, 920px);
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.22);
      background: #fff;
      box-shadow: 0 30px 90px rgba(15,23,42,0.28);
      display: grid;
      grid-template-rows: auto 1fr auto;
      z-index: 1;
    }

    .detail-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #fbfbfb);
    }

    .detail-head h3 {
      margin: 6px 0 0;
      font-size: 20px;
    }

    .detail-head .kicker {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .detail-close {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .detail-body {
      overflow: auto;
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
    }

    .detail-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      padding: 14px;
    }

    .detail-box h4 {
      margin: 0 0 10px;
      font-size: 14px;
    }

    .fields {
      display: grid;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 4px;
      font-size: 13px;
    }

    .field .label {
      color: var(--muted);
      font-size: 12px;
    }

    .field .value {
      line-height: 1.6;
    }

    .steps {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .steps li {
      display: flex;
      gap: 10px;
      align-items: start;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fafafa;
      font-size: 13px;
      line-height: 1.5;
    }

    .steps li.current {
      background: #eff6ff;
      border-color: rgba(59,130,246,0.22);
    }

    .steps .idx {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 11px;
      flex: none;
      margin-top: 1px;
    }

    .actions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0 20px 20px;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .action {
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      font-size: 13px;
    }

    .action.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .action.danger {
      color: var(--bad);
      border-color: rgba(185,28,28,0.18);
      background: #fff7f7;
    }

    .action.soft {
      background: #f8fafc;
    }

    .action:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none !important;
    }

    .file-list,
    .bullet-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .file-list li,
    .bullet-list li {
      display: flex;
      gap: 10px;
      align-items: start;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fafafa;
      font-size: 13px;
      line-height: 1.5;
    }

    .file-list button,
    .bullet-list button {
      text-align: left;
      width: 100%;
    }

    .detail-footer {
      padding: 12px 20px 16px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--line);
      background: #fbfbfb;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toasts {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 30;
      display: grid;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      min-width: 260px;
      max-width: 380px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.94);
      box-shadow: 0 16px 30px rgba(15,23,42,0.08);
      font-size: 13px;
      line-height: 1.55;
      color: var(--text);
      pointer-events: auto;
    }

    .toast .t {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .toast.ok { border-color: rgba(15,118,110,0.18); }
    .toast.warn { border-color: rgba(180,83,9,0.18); }
    .toast.bad { border-color: rgba(185,28,28,0.18); }

    .composer {
      position: fixed;
      right: 30px;
      bottom: 22px;
      z-index: 15;
      width: min(340px, calc(100vw - 60px));
      display: grid;
      gap: 10px;
      justify-items: end;
      pointer-events: none;
    }

    .orb {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 1px solid rgba(17,24,39,0.12);
      background: radial-gradient(circle at 30% 30%, #ffffff, #cfd6df 72%, #aab4c1 100%);
      box-shadow: 0 14px 40px rgba(15,23,42,0.16);
      display: grid;
      place-items: center;
      font-weight: 700;
      color: #111827;
      pointer-events: auto;
    }

    .composer-card {
      pointer-events: auto;
      width: 100%;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.92);
      padding: 10px;
      box-shadow: 0 12px 26px rgba(15,23,42,0.08);
    }

    .composer-card .hint {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .composer-row {
      display: flex;
      gap: 8px;
    }

    .composer-row input {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
      background: #fff;
      color: var(--text);
    }

    .composer-row input:focus {
      border-color: rgba(17,24,39,0.35);
      box-shadow: 0 0 0 4px rgba(17,24,39,0.06);
    }

    .composer-row button {
      border-radius: 12px;
      padding: 10px 12px;
      background: var(--accent);
      color: #fff;
    }

    .statusline {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #16a34a;
      box-shadow: 0 0 0 4px rgba(22,163,74,0.12);
    }

    .status-dot.paused {
      background: #d97706;
      box-shadow: 0 0 0 4px rgba(217,119,6,0.12);
    }

    .muted {
      color: var(--muted);
    }

    .hidden { display: none !important; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1280px) {
      .layout-3 { grid-template-columns: 1fr; }
      .layout-2 { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .jump-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .risk-grid { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 860px) {
      body { overflow: auto; }
      .app { padding: 10px; height: auto; min-height: 100vh; }
      .shell { height: auto; min-height: calc(100vh - 20px); }
      .topbar { flex-direction: column; align-items: stretch; }
      .brand { min-width: 0; }
      .toolbar { justify-content: space-between; }
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .jump-grid { grid-template-columns: 1fr; }
      .composer { right: 16px; bottom: 14px; width: calc(100vw - 32px); }
      .page-head { flex-direction: column; align-items: start; }
      .page-note { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell" id="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-badge">MOCK</div>
          <div>
            <h1>Agent 仪表盘原型</h1>
            <p>任务 / 待办 / 摘要 / 镜子 · 5 秒自动切页，hover 与详情会暂停</p>
          </div>
        </div>
        <nav class="nav" id="nav"></nav>
        <div class="toolbar">
          <button type="button" class="ghost" data-action="prev-page">← 上一页</button>
          <button type="button" class="ghost" data-action="next-page">下一页 →</button>
          <div class="statusline" id="statusLine"></div>
        </div>
      </header>
      <main class="stage" id="stage">
        <div class="stage-inner" id="stageInner">
          <div class="page" id="page"></div>
        </div>
      </main>
    </div>
  </div>

  <div class="detail-overlay" id="detailOverlay" aria-hidden="true">
    <div class="detail-backdrop"></div>
    <section class="detail" id="detail"></section>
  </div>

  <div class="toasts" id="toasts"></div>

  <div class="composer">
    <div class="orb" title="悬浮球">AI</div>
    <div class="composer-card">
      <div class="hint" id="composerHint">悬浮球下方输入框：用于继续修改、补充说明或 mock 指令</div>
      <div class="composer-row">
        <input id="composerInput" type="text" placeholder="输入一句 mock 指令" />
        <button type="button" id="composerSend">发送</button>
      </div>
    </div>
  </div>

  <script>
    const pages = [
      { key: 'tasks', label: '任务' },
      { key: 'todos', label: '待办' },
      { key: 'summary', label: '摘要' },
      { key: 'mirror', label: '镜子' }
    ];

    const now = Date.now();
    const mins = (n) => now + n * 60 * 1000;
    const hours = (n) => now + n * 60 * 60 * 1000;
    const days = (n) => now + n * 24 * 60 * 60 * 1000;

    const state = {
      pageIndex: 0,
      detail: null,
      finishedView: 3,
      hoverPaused: false,
      composerMode: null,
      lastJump: '摘要页',
    };

    let tasks = [
      {
        id: 'task-1',
        name: '梳理任务/待办边界',
        status: 'active',
        progress: '第 2 / 5 步：确认任务页与待办页的职责边界',

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function fmtTime(ts) {
      const d = new Date(ts);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    function relativeTime(ts) {
      const diff = ts - Date.now();
      const abs = Math.abs(diff);
      const minutes = Math.round(abs / 60000);
      const hours = Math.round(abs / 3600000);
      const days = Math.round(abs / 86400000);
      if (abs < 45 * 1000) return diff >= 0 ? '刚刚要到' : '刚刚过去';
      if (abs < 90 * 60 * 1000) return diff >= 0 ? `约 ${minutes} 分钟后` : `约 ${minutes} 分钟前`;
      if (abs < 36 * 60 * 60 * 1000) return diff >= 0 ? `约 ${hours} 小时后` : `约 ${hours} 小时前`;
      return diff >= 0 ? `约 ${days} 天后` : `约 ${days} 天前`;
    }

    function timeInfo(start, end) {
      if (end) return `${fmtTime(start)} - ${fmtTime(end)} · ${relativeTime(start)}`;
      return `${fmtTime(start)} · ${relativeTime(start)}`;
    }

      if (type.startsWith('task')) return getTask(id);

      if (type === 'mirror-summary') return mirrorSummaries.find((item) => item.id === id);
      if (type === 'mirror-log') return mirrorLogs.find((item) => item.id === id);
      return null;
    }

    function toast(message, tone = 'ok', title = 'Mock 提示') {
      const node = document.createElement('div');
      node.className = `toast ${tone}`;
      node.innerHTML = `<div class="t">${escapeHtml(title)}</div><div>${escapeHtml(message)}</div>`;
      el.toasts.appendChild(node);
      setTimeout(() => {
        node.style.opacity = '0';
        node.style.transform = 'translateY(-4px)';
        setTimeout(() => node.remove(), 180);
      }, 2600);
    }

      const restored = {
        ...item,
        id: `todo-restore-${Math.random().toString(36).slice(2, 7)}`,
        status: item.kind === 'repeat-instance' || item.kind === 'repeat-rule' ? 'upcoming' : 'upcoming',
        bucket: item.kind === 'repeat-rule' ? 'repeat' : (item.timeInfo && item.timeInfo.includes('已逾期') ? 'recent' : 'future'),
        timeInfo: item.kind === 'repeat-instance' ? '恢复到近期要做' : '恢复为未完成',
        sortAt: createdAt,
        endedAt: undefined,
        promotedTaskId: item.promotedTaskId || null
      };
      todos.unshift(restored);
      addLog({
        type: '恢复',
        title: `恢复待办：${item.name}`,
        detail: `结束态待办 ${item.id} 被恢复为未完成，并由 mock agent 判断进入相应子类。`,
        refs: [item.id, restored.id],
        path: `E:/mock/logs/${item.id}-restore.log`
      });
      toast('已恢复为未完成。', 'ok');
      return restored;
    }

    function deleteItem(kind, id) {
      if (kind.startsWith('task')) {
        tasks = tasks.filter((item) => item.id !== id);
      } else {
        todos = todos.filter((item) => item.id !== id);
      }
      toast('记录已删除。', 'warn');
      render();
    }

    function openLocalPath(path) {
      toast(`Mock 打开本地路径：${path}`, 'ok');
    }

    function handlePageAction(action, dataset) {
      if (action === 'prev-page') return setPage(state.pageIndex - 1);
      if (action === 'next-page') return setPage(state.pageIndex + 1);
      if (action === 'goto-page') return setPage(Number(dataset.index || 0));

      if (action === 'finished-view') {
        const value = dataset.value;
        if (value === 'more') {
          state.finishedView = 'more';
          toast('Mock：打开存放已完成任务的文件夹。', 'warn');
        } else {
          state.finishedView = Number(value);
        }
        render();
        return;
      }

      if (action === 'jump-detail') {
        setPage(Number(dataset.page || 0), true);
        openDetail(dataset.type, dataset.id);
        return;
      }

      if (action === 'open-path') {
        openLocalPath(dataset.path);
        return;
      }

      if (action === 'clean-records') {
        toast(`Mock 提示：是否清理过去 ${dataset.range || '30 天'} 的记录？`, 'warn');
        return;
      }

      if (action === 'jump-page') {
        setPage(Number(dataset.index || 0));
        return;
      }
    }

    function handleDetailAction(action, dataset) {
      const target = getCurrentDetailTarget();
      if (!target) return;

      if (action === 'close-detail') return closeDetail();

      if (state.detail.type.startsWith('task-active')) {
        const task = target;
        if (action === 'task-toggle') {
          if (task.status === 'paused') {
            task.status = 'active';
            task.progress = '已继续执行';
            task.operations.unshift('继续执行');
            addLog({ type: '恢复', title: `任务继续：${task.name}`, detail: '任务从暂停回到进行中。', refs: [task.id], path: `E:/mock/logs/${task.id}-resume.log` });
            toast('已继续。', 'ok');
          } else if (task.status === 'waiting') {
            task.status = 'active';
            task.progress = '已获得授权，继续执行';
            task.operations.unshift('授权后继续');
            addLog({ type: '授权', title: `授权后继续：${task.name}`, detail: '等待授权任务已转回正在进行。', refs: [task.id], path: `E:/mock/logs/${task.id}-auth.log` });
            toast('Mock 授权后继续执行。', 'ok');
          } else if (task.status === 'failed') {
            task.status = 'active';
            task.progress = '已从失败态重试，重新进入执行';
            task.operations.unshift('失败后重试');
            addLog({ type: '重启', title: `失败任务重试：${task.name}`, detail: '失败任务被 mock 重试并回到进行中。', refs: [task.id], path: `E:/mock/logs/${task.id}-retry.log` });
            toast('已从失败态重试。', 'warn');
          } else {
            task.status = 'paused';
            task.progress = '已暂停，等待后续继续';
            task.operations.unshift('暂停执行');
            addLog({ type: '暂停', title: `任务暂停：${task.name}`, detail: '任务已暂停。', refs: [task.id], path: `E:/mock/logs/${task.id}-pause.log` });
            toast('已暂停。', 'warn');
          }
          task.updatedAt = Date.now();
          task.sortAt = task.updatedAt;
          render();
          return;
        }

        if (action === 'task-cancel') {
          task.status = 'canceled';
          task.progress = '已取消';
          task.endedAt = Date.now();
          task.sortAt = task.endedAt;
          addLog({ type: '取消', title: `取消任务：${task.name}`, detail: '未完成任务被取消并转入已结束区。', refs: [task.id], path: `E:/mock/logs/${task.id}-cancel.log` });
          toast('已取消并移入已结束。', 'warn');
          render();
          return;
        }

        if (action === 'task-modify') {
          task.status = 'paused';
          task.progress = '已暂停思考，等待你在悬浮球输入框继续修改';
          task.updatedAt = Date.now();
          task.sortAt = task.updatedAt;
          setComposerMode({ type: 'modify-task', id: task.id }, '已暂停思考，请在悬浮球下方输入框继续修改（不是弹窗表单）');
          toast('已暂停思考，请在下方输入框继续修改。', 'warn');
          render();
          return;
        }
      }

      if (state.detail.type === 'task-ended') {
        const task = target;
        if (action === 'task-restart') {
          const clone = createTaskFromEnded(task);
          closeDetail();
          setPage(0, true);
          openDetail('task-active', clone.id);
          return;
        }
        if (action === 'task-delete') {
          deleteItem('task', task.id);
          closeDetail();
          return;
        }
      }

      if (state.detail.type === 'todo-recent') {
        const todo = target;
        if (action === 'todo-execute') {
          promoteTodoToTask(todo.id);
          render();
          return;
        }
        if (action === 'todo-complete') {
          todo.status = 'done';
          todo.bucket = 'ended';
          todo.endedAt = Date.now();
          todo.timeInfo = '已完成';
          todo.sortAt = todo.endedAt;
          addLog({ type: '完成', title: `待办完成：${todo.name}`, detail: '近期要做已完成。', refs: [todo.id], path: `E:/mock/logs/${todo.id}-complete.log` });
          toast('已标记完成。', 'ok');
          render();
          return;
        }
        if (action === 'todo-cancel') {
          todo.status = todo.kind === 'repeat-instance' ? 'canceled' : 'canceled';
          todo.bucket = 'ended';
          todo.endedAt = Date.now();
          todo.timeInfo = todo.kind === 'repeat-instance' ? '跳过本次' : '已取消';
          todo.sortAt = todo.endedAt;
          addLog({ type: '取消', title: `待办取消：${todo.name}`, detail: todo.kind === 'repeat-instance' ? '重复实例被跳过本次。' : '待办已取消。', refs: [todo.id], path: `E:/mock/logs/${todo.id}-cancel.log` });
          toast(todo.kind === 'repeat-instance' ? '已跳过本次。' : '已取消。', 'warn');
          render();
          return;
        }
        if (action === 'todo-edit') {
          if (todo.kind === 'repeat-instance') {
            toast('重复事项实例不能改规则，请到规则本身编辑。', 'warn');
          } else {
            toast('Mock 编辑已打开：这里不会弹出表单。', 'ok');
          }
          return;
        }
        if (action === 'todo-docs') {
          openLocalPath(todo.docs?.[0] || 'E:/mock/docs/related.md');
          addLog({ type: '产出', title: `打开资料：${todo.name}`, detail: '从待办详情打开相关资料。', refs: [todo.id], path: todo.docs?.[0] || 'E:/mock/docs/related.md' });
          return;
        }
      }

      if (state.detail.type === 'todo-future') {
        const todo = target;
        if (action === 'todo-advance') {
          todo.bucket = 'recent';
          todo.status = 'upcoming';
          todo.timeInfo = '已提前到近期要做';
          todo.sortAt = Date.now();
          addLog({ type: '恢复', title: `提前到近期要做：${todo.name}`, detail: '后续安排被提升到近期要做。', refs: [todo.id], path: `E:/mock/logs/${todo.id}-advance.log` });
          toast('已提前到近期要做。', 'ok');
          render();
          return;
        }
        if (action === 'todo-edit') {
          toast('Mock 编辑已打开：未来安排不显示真实表单。', 'ok');
          return;
        }
        if (action === 'todo-cancel') {
          todo.status = 'canceled';
          todo.bucket = 'ended';
          todo.endedAt = Date.now();
          todo.sortAt = todo.endedAt;
          addLog({ type: '取消', title: `后续安排取消：${todo.name}`, detail: '后续安排被取消。', refs: [todo.id], path: `E:/mock/logs/${todo.id}-cancel.log` });
          toast('已取消。', 'warn');
          render();
          return;
        }
        if (action === 'todo-docs') {
          openLocalPath(todo.docs?.[0] || 'E:/mock/docs/related.md');
          return;
        }
      }

      if (state.detail.type === 'todo-repeat-rule') {
        const todo = target;
        if (action === 'todo-rule-toggle') {
          todo.paused = !todo.paused;
          addLog({ type: todo.paused ? '暂停' : '恢复', title: `${todo.paused ? '暂停' : '开启'}重复事项：${todo.name}`, detail: '规则本身被切换状态。', refs: [todo.id], path: `E:/mock/logs/${todo.id}-toggle.log` });
          toast(todo.paused ? '已暂停重复。' : '已开启重复。', 'ok');
          render();
          return;
        }
        if (action === 'todo-rule-edit') {
          toast('重复事项规则不弹出表单，只做 mock 修改提示。', 'ok');
          return;
        }
        if (action === 'todo-rule-cancel') {
          todo.status = 'canceled';
          todo.bucket = 'ended';
          todo.endedAt = Date.now();
          todo.sortAt = todo.endedAt;
          addLog({ type: '取消', title: `取消整个重复事项：${todo.name}`, detail: '重复事项规则被整体取消。', refs: [todo.id], path: `E:/mock/logs/${todo.id}-cancel.log` });
          toast('已取消整个重复事项。', 'warn');
          render();
          return;
        }
        if (action === 'todo-docs') {
          openLocalPath(todo.docs?.[0] || 'E:/mock/docs/related.md');
          return;
        }
      }

      if (state.detail.type === 'todo-ended') {
        const todo = target;
        if (action === 'todo-restore') {
          const restored = restoreTodo(todo);
          closeDetail();
          setPage(1, true);
          openDetail(restored.kind === 'repeat-rule' ? 'todo-repeat-rule' : (restored.kind === 'repeat-instance' || restored.status === 'upcoming' ? 'todo-recent' : 'todo-future'), restored.id);
          return;
        }
        if (action === 'todo-delete') {
          deleteItem('todo', todo.id);
          closeDetail();
          return;
        }
      }

      if (state.detail.type === 'mirror-summary') {
        if (action === 'mirror-path') {
          openLocalPath(target.path);
          return;
        }
      }

      if (state.detail.type === 'mirror-log') {
        if (action === 'mirror-path') {
          openLocalPath(target.path || 'E:/mock/logs');
          return;
        }
      }
    }

    function taskCard(task) {
      const label = taskLabel(task.status);
      const ending = ['done', 'canceled'].includes(task.status);
      const openType = ending ? 'task-ended' : 'task-active';
      return `
        <button class="card" data-open="${openType}" data-id="${task.id}">
          <div class="card-top">
            <div>
              <h3>${escapeHtml(task.name)}</h3>
              <div class="mini">${escapeHtml(task.progress)}</div>
            </div>
            <span class="chip ${label.cls}">${escapeHtml(label.label)}</span>
          </div>
          <p>更新时间：${escapeHtml(relativeTime(task.sortAt))} · ${escapeHtml(task.linkedTodoId ? `来源待办 ${task.linkedTodoId}` : '独立任务')}</p>
          <div class="meta">
            <span class="chip">步骤 ${task.currentStep + 1}/${task.steps.length}</span>
            ${task.memoryRefs.slice(0, 2).map((m) => `<span class="chip soft">${escapeHtml(m)}</span>`).join('')}
          </div>
        </button>
      `;
    }

    function todoRecentCard(todo) {
      const label = todoLabel(todo.status);
      const promo = todo.promotedTaskId ? `<span class="chip ok">已转任务</span>` : '';
      const extra = todo.kind === 'repeat-instance' ? '<span class="chip soft">重复实例</span>' : '<span class="chip">单次事项</span>';
      return `
        <button class="card" data-open="todo-recent" data-id="${todo.id}">
          <div class="card-top">
            <div>
              <h3>${escapeHtml(todo.name)}</h3>
              <div class="mini">${escapeHtml(todo.note)}</div>
            </div>
            <span class="chip ${label.cls}">${escapeHtml(label.label)}</span>
          </div>
          <p>${escapeHtml(todo.timeLabel)} · ${escapeHtml(todo.timeInfo)}</p>
          <div class="meta">${extra}${promo}</div>
        </button>
      `;
    }

    function todoFutureCard(todo) {
      const label = todoLabel(todo.status);
      return `
        <button class="card" data-open="todo-future" data-id="${todo.id}">
          <div class="card-top">
            <div>
              <h3>${escapeHtml(todo.name)}</h3>
              <div class="mini">${escapeHtml(todo.prereq)}</div>
            </div>
            <span class="chip ${label.cls}">${escapeHtml(label.label)}</span>
          </div>
          <p>${escapeHtml(todo.timeLabel)} · ${escapeHtml(todo.timeInfo)}</p>
          <div class="meta"><span class="chip">后续安排</span></div>
        </button>
      `;
    }

    function todoRuleCard(todo) {
      const label = todo.paused ? '已暂停' : '生效中';
      const cls = todo.paused ? 'warn' : 'ok';
      return `
        <button class="card" data-open="todo-repeat-rule" data-id="${todo.id}">
          <div class="card-top">
            <div>
              <h3>${escapeHtml(todo.name)}</h3>
              <div class="mini">${escapeHtml(todo.repeatRule)} · 下次 ${escapeHtml(todo.nextOccurs)}</div>
            </div>
            <span class="chip ${cls}">${label}</span>
          </div>
          <p>最近一次状态：${escapeHtml(todo.lastStatus)} · 生效范围：${escapeHtml(todo.effectiveRange)}</p>
          <div class="meta">
            <span class="chip">规则本身</span>
            <span class="chip ${todo.missedCount ? 'bad' : 'ok'}">连续漏做 ${todo.missedCount || 0}</span>
          </div>
        </button>
      `;
    }

    function todoEndedCard(todo) {
      const label = todoLabel(todo.status);
      return `
        <button class="card" data-open="todo-ended" data-id="${todo.id}">
          <div class="card-top">
            <div>
              <h3>${escapeHtml(todo.name)}</h3>
              <div class="mini">${escapeHtml(todo.kind === 'repeat-instance' ? '重复事项实例' : '单次事项')}</div>
            </div>
            <span class="chip ${label.cls}">${escapeHtml(label.label)}</span>
          </div>
          <p>原定：${escapeHtml(todo.originalTime || todo.timeLabel)} · 结束：${escapeHtml(relativeTime(todo.endedAt || todo.sortAt))}</p>
          <div class="meta"><span class="chip">已结束</span></div>
        </button>
      `;
    }

    function mirrorSummaryCard(item) {
      return `
        <button class="timeline-item" data-open="mirror-summary" data-id="${item.id}">
          <div class="top">
            <h4>${escapeHtml(item.title)}</h4>
            <span class="chip soft">${escapeHtml(relativeTime(item.updatedAt))}</span>
          </div>
          <p>${escapeHtml(item.summary)}</p>
          <div class="meta">${item.refs.map((ref) => `<span class="chip">${escapeHtml(ref)}</span>`).join('')}</div>
        </button>
      `;
    }

    function mirrorLogCard(item) {
      return `
        <button class="timeline-item" data-open="mirror-log" data-id="${item.id}">
          <div class="top">
            <h4>${escapeHtml(item.type)} · ${escapeHtml(item.title)}</h4>
            <span class="chip">${escapeHtml(relativeTime(item.at))}</span>
          </div>
          <p>${escapeHtml(item.detail)}</p>
          <div class="meta">${item.refs.map((ref) => `<span class="chip soft">${escapeHtml(ref)}</span>`).join('')}</div>
        </button>
      `;
    }

    function renderNav() {
      el.nav.innerHTML = pages.map((page, index) => `
        <button class="${index === state.pageIndex ? 'active' : ''}" data-action="jump-page" data-index="${index}">${page.label}</button>
      `).join('');
    }

    function renderStatusLine() {
      const dotClass = isPaused() ? 'status-dot paused' : 'status-dot';
      el.statusLine.innerHTML = `
        <span class="${dotClass}"></span>
        <span>${escapeHtml(isPaused() ? '轮播暂停' : '自动轮播中')}</span>
        <span>· 当前 ${escapeHtml(activePage().label)} 页</span>
        <span>· ${escapeHtml(state.lastJump)}</span>
      `;
    }

    function taskEndedViewButtons() {
      const items = [3, 7, 'more'];
      return items.map((value) => {
        const label = value === 'more' ? '更多' : String(value);
        const active = state.finishedView === value;
        return `<button class="${active ? 'active' : ''}" data-action="finished-view" data-value="${value}">${label}</button>`;
      }).join('');
    }

    function buildTasksPage() {
      const activeTasks = sortByRecent(tasks.filter((item) => !['done', 'canceled'].includes(item.status)));
      const endedTasks = sortByRecent(tasks.filter((item) => ['done', 'canceled'].includes(item.status)), 'endedAt');
      const showEnded = state.finishedView === 'more' ? endedTasks : endedTasks.slice(0, state.finishedView);
      return `
        <section class="page">
          ${tasks.length >= 6 ? `<div class="banner">
            <div>系统默认全部存储；记录偏大时可 mock 清理过去一段时间的记录。</div>
            <div class="actions">
              <button class="ghost" data-action="clean-records" data-range="30 天">清理 30 天</button>
              <button class="ghost" data-action="clean-records" data-range="7 天">清理 7 天</button>
            </div>
          </div>` : ''}
          <div class="page-head">
            <div>
              <h2>任务</h2>
              <p>只看正在被 agent 推进的工作；不展示普通未来提醒。未完成全部可见，已结束按 3 / 7 / 更多 查看。</p>
            </div>
            <div class="page-note">修改不是弹窗表单，而是回到悬浮球下方输入框继续。</div>
          </div>
          <div class="layout-2">
            <section class="panel">
              <div class="panel-head">
                <div><strong>未完成</strong> <span class="sub">${activeTasks.length} 条</span></div>
                <span class="chip">按最近更新时间排序</span>
              </div>
              <div class="stack">
                ${activeTasks.map(taskCard).join('') || '<div class="card"><h3>暂无未完成任务</h3><p>此处只会显示正在推进的工作。</p></div>'}
              </div>
            </section>
            <section class="panel">
              <div class="panel-head">
                <div><strong>已结束</strong> <span class="sub">${endedTasks.length} 条</span></div>
                <div class="seg">${taskEndedViewButtons()}</div>
              </div>
              <div class="stack">
                ${showEnded.map(taskCard).join('') || '<div class="card"><h3>暂无已结束任务</h3><p>这会随着 mock 操作动态变化。</p></div>'}
              </div>
              <div class="list-note">点击“更多”会模拟打开存放已完成任务的文件夹。</div>
            </section>
          </div>
        </section>
      `;
    }

    function buildTodosPage() {
      const recent = sortByRecent(todos.filter((item) => item.bucket === 'recent' || item.kind === 'repeat-instance'));
      const future = sortByRecent(todos.filter((item) => item.bucket === 'future'));
      const repeatRules = sortByRecent(todos.filter((item) => item.kind === 'repeat-rule'));
      const ended = sortByRecent(todos.filter((item) => item.bucket === 'ended'), 'endedAt');
      return `
        <section class="page">
          <div class="page-head">
            <div>
              <h2>待办</h2>
              <p>只看未来安排，不展示“正在进行 / 失败 / 等待授权”这种任务流状态。未完成分为近期要做、后续安排、重复事项。</p>
            </div>
            <div class="page-note">近期要做中包含重复事项当天实例；规则本身只在重复事项里看。</div>
          </div>
          <div class="layout-2">
            <section class="panel">
              <div class="panel-head"><div><strong>近期要做</strong> <span class="sub">${recent.length} 条</span></div><span class="chip ok">即将到来 / 已逾期</span></div>
              <div class="stack">${recent.map(todoRecentCard).join('') || '<div class="card"><h3>暂无近期要做</h3></div>'}</div>
              <div class="list-note">若是重复事项实例，编辑时不能改规则。</div>
            </section>
            <section class="panel">
              <div class="panel-head"><div><strong>后续安排</strong> <span class="sub">${future.length} 条</span></div><span class="chip">未到时间</span></div>
              <div class="stack">${future.map(todoFutureCard).join('') || '<div class="card"><h3>暂无后续安排</h3></div>'}</div>
              <div class="list-note">可以提前到近期要做，仍然只是 mock 调整。</div>
            </section>
          </div>
          <div class="layout-2">
            <section class="panel">
              <div class="panel-head"><div><strong>重复事项</strong> <span class="sub">${repeatRules.length} 条规则</span></div><span class="chip soft">规则本身</span></div>
              <div class="stack">${repeatRules.map(todoRuleCard).join('') || '<div class="card"><h3>暂无重复事项规则</h3></div>'}</div>

                <div class="field"><div class="label">事件类型</div><div class="value">${escapeHtml(item.type)}</div></div>
                <div class="field"><div class="label">标题</div><div class="value">${escapeHtml(item.title)}</div></div>
                <div class="field"><div class="label">详情</div><div class="value">${escapeHtml(item.detail)}</div></div>
                <div class="field"><div class="label">相关对象</div><div class="value">${item.refs.map((ref) => `<span class="chip soft">${escapeHtml(ref)}</span>`).join(' ')}</div></div>
              </div>
            </div>
            <div class="detail-box">
              <h4>路径</h4>
              <ul class="file-list">
                <li><button data-action="mirror-path"><strong>${escapeHtml(item.path || 'E:/mock/logs/')}</strong><div class="mini">mock 跳转到本地路径</div></button></li>
              </ul>
            </div>
          </div>
        `;
      }

      el.overlay.classList.add('show');
      el.overlay.setAttribute('aria-hidden', 'false');
      el.detail.innerHTML = `
        <div class="detail-head">
          <div>
            <div class="kicker">${escapeHtml(kicker)}</div>
            <h3>${escapeHtml(title)}</h3>
          </div>
          <button class="detail-close" data-action="close-detail">✕</button>
        </div>
        <div class="detail-body">${body}</div>
        <div class="detail-footer">
          <div>${escapeHtml(footer)}</div>
          <div>${escapeHtml(type.startsWith('task') ? '任务页' : type.startsWith('todo') ? '待办页' : '镜子页')} 的 detail 会暂停自动轮播。</div>
        </div>
      `;
    }

    function render() {
      renderNav();
      renderStatusLine();
      const page = activePage().key;
      if (page === 'tasks') el.page.innerHTML = buildTasksPage();
      if (page === 'todos') el.page.innerHTML = buildTodosPage();
      if (page === 'summary') el.page.innerHTML = buildSummaryPage();
      if (page === 'mirror') el.page.innerHTML = buildMirrorPage();
      renderDetail();
    }

    el.stage.addEventListener('mouseenter', () => {
      state.hoverPaused = true;
      renderStatusLine();
    });

    el.stage.addEventListener('mouseleave', () => {
      state.hoverPaused = false;
      renderStatusLine();
    });

    document.getElementById('nav').addEventListener('click', (event) => {
      const btn = event.target.closest('[data-action]');
      if (!btn) return;
      handlePageAction(btn.dataset.action, btn.dataset);
    });

    document.querySelector('.toolbar').addEventListener('click', (event) => {
      const btn = event.target.closest('[data-action]');
      if (!btn) return;
      handlePageAction(btn.dataset.action, btn.dataset);
    });

    el.page.addEventListener('click', (event) => {
      const action = event.target.closest('[data-action]');
      if (action) {
        const actionName = action.dataset.action;
        if (actionName === 'jump-detail') {
          handlePageAction(actionName, action.dataset);
          return;
        }
        handleDetailAction(actionName, action.dataset);
        return;
      }
      const card = event.target.closest('[data-open]');
      if (card) openDetail(card.dataset.open, card.dataset.id);
    });

    el.overlay.addEventListener('click', (event) => {
      if (event.target.classList.contains('detail-backdrop') || event.target === el.overlay) closeDetail();
      const action = event.target.closest('[data-action]');
      if (action && action.dataset.action !== 'close-detail') {
        handleDetailAction(action.dataset.action, action.dataset);
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && state.detail) closeDetail();
    });

    el.composerSend.addEventListener('click', () => {
      const text = el.composerInput.value.trim();
      if (!text) return toast('先输入一点内容。', 'warn');
      const target = currentComposerTarget();
      if (target && state.composerMode.type === 'modify-task') {
        target.operations.unshift(`修改说明：${text}`);
        target.progress = `已接收修改：${text.slice(0, 24)}`;
        target.status = 'active';
        target.updatedAt = Date.now();
        target.sortAt = target.updatedAt;
        addLog({ type: '修改', title: `修改任务：${target.name}`, detail: `通过悬浮球输入框接收修改：${text}`, refs: [target.id], path: `E:/mock/logs/${target.id}-modify.log` });
        toast('已把修改输入写入任务。', 'ok');
        state.composerMode = null;
        el.composerInput.value = '';
        el.composerHint.textContent = '悬浮球下方输入框：用于继续修改、补充说明或 mock 指令';
        render();
        return;
      }
      addLog({ type: '记忆', title: '悬浮球输入', detail: text, refs: [], path: 'E:/mock/logs/composer.log' });
      toast(`已记录输入：${text}`, 'ok');
      el.composerInput.value = '';
    });

    el.composerInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') el.composerSend.click();
    });

    setInterval(() => {
      if (!isPaused()) setPage(state.pageIndex + 1, true);
    }, 5000);

    render();
    toast('原型已启动：任务/待办边界、自动转任务、重复事项与镜子日志均为 mock。', 'ok', '初始化');
  </script>
</body>
</html>
